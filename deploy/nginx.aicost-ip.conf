# Include these locations in the existing server block that listens on 80
# for 124.221.103.75. The main Next.js app can keep owning `/`.

location = /aicost {
    return 301 /aicost/;
}

location /aicost/ {
    alias /opt/aicost/frontend/dist/;
    index index.html;
    try_files $uri $uri/ /aicost/index.html;
}

location /api/aicost/ {
    proxy_pass http://127.0.0.1:8000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_read_timeout 300s;
}
